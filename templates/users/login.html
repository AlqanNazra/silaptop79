<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SILAPTOP79</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f5f8fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            text-align: center;
        }
        .logo {
            color: #0b57c6;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 2.5rem;
            letter-spacing: -0.5px;
        }
        .login-box {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            text-align: left;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }
        .form-label {
            font-size: 11px;
            font-weight: 700;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .recovery-link {
            font-size: 11px;
            font-weight: 700;
            color: #0b57c6;
            text-decoration: none;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i.left-icon {
            position: absolute;
            left: 1rem;
            color: #adb5bd;
            font-size: 16px;
        }
        .input-wrapper input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            box-sizing: border-box;
            outline: none;
            color: #495057;
        }
        .input-wrapper input:focus {
            border-color: #0b57c6;
            box-shadow: 0 0 0 3px rgba(11, 87, 198, 0.1);
        }
        .input-wrapper input::placeholder {
            color: #ced4da;
            font-weight: 500;
        }
        .input-wrapper i.right-icon {
            position: absolute;
            right: 1rem;
            color: #adb5bd;
            font-size: 14px;
            cursor: pointer;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            margin-top: 1rem;
        }
        .checkbox-group input {
            margin: 0 0.5rem 0 0;
            cursor: pointer;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            accent-color: #0b57c6;
        }
        .checkbox-label {
            font-size: 12px;
            font-weight: 500;
            color: #495057;
            cursor: pointer;
        }
        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: #0b57c6;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(11, 87, 198, 0.3);
        }
        .submit-btn:hover {
            background: #09459e;
        }
        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">SILAPTOP79</div>
        
        <div class="login-box">
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="error-message">
                    Username atau password salah. Silakan coba lagi.
                </div>
                {% endif %}

                <div class="form-group">
                    <div class="form-header">
                        <span class="form-label">ACCOUNT ACCESS</span>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-circle-user left-icon"></i>
                        <input type="text" name="username" placeholder="Username or Email" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-header">
                        <span class="form-label">CREDENTIAL</span>
                        <a href="#" class="recovery-link">Recovery?</a>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key left-icon"></i>
                        <input type="password" id="password_input" name="password" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye right-icon" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="keep_auth" name="keep_auth">
                    <label for="keep_auth" class="checkbox-label">keep me authenticated</label>
                </div>

                <input type="hidden" name="next" value="{{ next|default:'/login-redirect/' }}">
                <button type="submit" class="submit-btn">Log In</button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            var passwordInput = document.getElementById("password_input");
            var icon = document.querySelector(".right-icon");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
