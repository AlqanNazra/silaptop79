{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SILAPTOP79</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/users_login.css' %}">
</head>
<body>

    <div class="login-container">
        <div class="logo">SILAPTOP79</div>
        
        <div class="login-box">
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="error-message">
                    Username atau password salah. Silakan coba lagi.
                </div>
                {% endif %}

                <div class="form-group">
                    <div class="form-header">
                        <span class="form-label">ACCOUNT ACCESS</span>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-circle-user left-icon"></i>
                        <input type="text" name="username" placeholder="Username or Email" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-header">
                        <span class="form-label">CREDENTIAL</span>
                        <a href="#" class="recovery-link">Recovery?</a>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key left-icon"></i>
                        <input type="password" id="password_input" name="password" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye right-icon" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="keep_auth" name="keep_auth">
                    <label for="keep_auth" class="checkbox-label">keep me authenticated</label>
                </div>

                <input type="hidden" name="next" value="{{ next|default:'/login-redirect/' }}">
                <button type="submit" class="submit-btn">Log In</button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            var passwordInput = document.getElementById("password_input");
            var icon = document.querySelector(".right-icon");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
