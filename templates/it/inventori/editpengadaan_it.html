{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Pengadaan - SiLaptop79</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <link rel="stylesheet" href="{% static 'css/editpengadaan_it.css' %}">
</head>

<body>

    {% include 'it/components/sidebar.html' with active_page='kelola_pengadaan' %}

    <div class="main-content">
        <!-- Flash Messages -->
        {% include 'components/messages_popup.html' %}

        <div class="top-nav">
            <h1 class="page-title">Edit Data Pengadaan</h1>
        </div>

        <form id="editForm" method="POST" action="">
            {% csrf_token %}
            <div class="edit-form-container">

                <!-- Informasi Laptop Card -->
                <div class="card">
                    <div class="card-title">
                        <span class="title-accent-blue"></span>Informasi Laptop
                    </div>
                    <div class="row-group-2">
                        <div class="form-group">
                            <label>Laptop Name</label>
                            <input type="text" name="nama_laptop" value="{{ laptop.nama_laptop }}" required>
                        </div>
                        <div class="form-group">
                            <label>GPU (Graphics Card)</label>
                            <input type="text" name="gpu" value="{{ laptop.gpu|default:"" }}">
                        </div>
                    </div>
                    <div class="row-group-2">
                        <div class="form-group">
                            <label>ID Pengadaan (Tidak Dapat Diubah)</label>
                            <input type="text" value="{{ laptop.id_laptop_pengadaan }}" disabled style="background-color: #e2e8f0; color: #64748b;">
                        </div>
                        <div class="form-group">
                            <label>Supplier / Brand</label>
                            <input type="text" value="{{ laptop.manufacturer|default:"-" }}" disabled style="background-color: #e2e8f0; color: #64748b;">
                        </div>
                    </div>
                </div>

                <!-- Spesifikasi Card -->
                <div class="card">
                    <div class="card-title">
                        <span class="title-accent-green"></span>Spesifikasi
                    </div>
                    <div class="row-group-2">
                        <div class="form-group">
                            <label>Processor</label>
                            <select name="id_processor" required>
                                <option value="" disabled>Pilih Processor</option>
                                {% for proc in processors %}
                                <option value="{{ proc.id_processor }}" {% if laptop.nama_processor == proc.nama_processor %}selected{% endif %}>{{ proc.nama_processor }} ({{ proc.manufacturer }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>RAM</label>
                            <select name="id_ram" required>
                                <option value="" disabled>Pilih RAM</option>
                                {% for ram in rams %}
                                <option value="{{ ram.id_ram }}" {% if laptop.ram_kapasitas == ram.kapasitas_gb %}selected{% endif %}>{{ ram.kapasitas_gb }} GB {{ ram.tipe }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row-group-3">
                        <div class="form-group">
                            <label>Storage</label>
                            <select name="id_storage" required>
                                <option value="" disabled>Pilih Storage</option>
                                {% for st in storages %}
                                <option value="{{ st.id_storage }}" {% if laptop.storage_kapasitas == st.kapasitas_gb %}selected{% endif %}>{{ st.kapasitas_gb }} GB {{ st.tipe }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Battery (MAH)</label>
                            <input type="number" name="baterai" value="{{ laptop.baterai|floatformat:"0" }}" step="any" required>
                        </div>
                        <div class="form-group">
                            <label>Weight (KG)</label>
                            <input type="number" name="berat" value="{{ laptop.berat }}" step="any" required>
                        </div>
                    </div>
                    <div class="form-group" style="width: calc(33.33% - 16px);">
                        <label>Screen Size (Inch)</label>
                        <input type="number" name="ukuran_layar" value="{{ laptop.ukuran_layar }}" step="any" required>
                    </div>
                </div>

                <!-- Harga Card -->
                <div class="card">
                    <div class="card-title">
                        <span class="title-accent-red"></span>Harga
                    </div>
                    <div class="form-group">
                        <label>Harga (Rupiah)</label>
                        <input type="number" name="harga" value="{{ laptop.harga }}" required>
                    </div>
                </div>

                <!-- Bottom Form Actions -->
                <div style="display: flex; gap: 16px; justify-content: flex-end; margin-top: 24px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
                    <a href="{% url 'detailpengadaan_it' %}?id={{ laptop.id_laptop_pengadaan }}" style="padding: 12px 24px; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: 600; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;">
                        <i class="fa-solid fa-xmark"></i> Batal
                    </a>
                    <button type="submit" class="btn-submit-pill" style="padding: 12px 28px; background: #0b57c6; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(11, 87, 198, 0.15); transition: all 0.2s;">
                        <i class="fa-solid fa-save"></i> Simpan Perubahan
                    </button>
                </div>

            </div>
        </form>
    </div>

</body>

</html>
