{% load static %}
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="logo-wrapper" style="gap: 8px;">
            <img src="{% static 'img/logo_tujuh_sembilan.png' %}" alt="Logo Tujuh Sembilan" style="height: 24px; width: auto; object-fit: contain; flex-shrink: 0;">
            <span class="logo-text" style="font-size: 1.1rem;">SILAPTOP79</span>
        </div>
    </div>

    <div class="sidebar-menu">
        <p class="menu-label">MAIN MENU</p>
        <ul class="menu-list">
            <li>
                <a href="{% url 'dashboard_talent' %}"
                    class="menu-item {% if active_page == 'dashboard' %}active{% endif %}">
                    <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
            </li>

            <li>
                <a href="{% url 'pengajuanlaptop_talent' %}"
                    class="menu-item {% if active_page == 'pengajuan_laptop' %}active{% endif %}">
                    <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <line x1="9" y1="15" x2="15" y2="15"></line>
                    </svg>
                    <span>Pengajuan Laptop</span>
                </a>
            </li>

            <li>
                <a href="{% url 'riwayatpeminjamanlaptop_talent' %}"
                    class="menu-item {% if active_page == 'history_pengajuan' %}active{% endif %}">
                    <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    <span>Riwayat Pengajuan</span>
                </a>
            </li>

            <li>
                <a href="{% url 'pengembalianlaptop_talent' %}"
                    class="menu-item {% if active_page == 'pengembalian' %}active{% endif %}">
                    <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <span>Pengembalian laptop</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="sidebar-footer">
        <div class="user-card">
            <div class="user-avatar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="user-info">
                <p class="user-name">Talent IT</p>
                <p class="user-role">User</p>
            </div>
            <a href="#" class="logout-btn" title="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </a>
        </div>
    </div>
</aside>
