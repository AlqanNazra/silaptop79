{% load static %}
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="logo-wrapper" style="gap: 8px;">
            <img src="{% static 'img/logo_tujuh_sembilan.png' %}" alt="Logo Tujuh Sembilan"
                style="height: 24px; width: auto; object-fit: contain; flex-shrink: 0;">
            <span class="logo-text" style="font-size: 1.1rem;">SILAPTOP79</span>
        </div>
    </div>

    <div class="sidebar-menu">
        <p class="menu-label">MAIN MENU</p>
        <ul class="menu-list">
            <li>
                <a href="{% url 'dashboard_hc' %}"
                    class="menu-item {% if active_page == 'dashboard' %}active{% endif %}">
                    <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
            </li>

            <li>
                <a href="{% url 'pengajuanlaptop_hc' %}"
                    class="menu-item {% if active_page == 'pengajuan_laptop' %}active{% endif %}">
                    <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        <circle cx="12" cy="14" r="3"></circle>
                        <path d="M12 12v2l1 1"></path>
                    </svg>
                    <span>Pengajuan Laptop</span>
                </a>
            </li>

            <li>
                <a href="{% url 'manajemen_laptop_hc' %}"
                    class="menu-item {% if request.resolver_match.url_name == 'manajemen_laptop_hc' or request.resolver_match.url_name == 'tambahlaptop_hc' or request.resolver_match.url_name == 'detaillaptop_hc' or request.resolver_match.url_name == 'editdatalaptop_hc' or request.resolver_match.url_name == 'riwayatpeminjamanlaptop_hc' %}active{% endif %}">

                    <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <span>Data Laptop</span>
                </a>
            </li>

            <li>
                <a href="{% url 'manajemenuser_hc' %}"
                    class="menu-item {% if active_page == 'manajemen_user' %}active{% endif %}">
                    <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>Manajemen User</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="sidebar-footer">
        <div class="user-card">
            <a href="{% url 'profile' %}" class="user-link">
                <div class="user-avatar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="user-info">
                    <p class="user-name">{% if user.is_authenticated %}{{ user.nama }}{% else %}Admin{% endif %}</p>
                    <p class="user-role">{% if user.is_authenticated %}{{ user.role }}{% else %}Human Capital{% endif %}
                    </p>
                </div>
            </a>
            <form action="{% url 'logout' %}" method="post" style="margin: 0; padding: 0;">
                {% csrf_token %}
                <button type="submit" class="logout-btn" title="Logout"
                    style="background: none; border: none; cursor: pointer;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</aside>
<!-- <script src="{% static 'js/table_sorter_v2.js' %}?v=1.2"></script> -->
