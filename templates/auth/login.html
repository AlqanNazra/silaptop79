{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SiLaptop79</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="{% static 'css/auth_login.css' %}">
</head>

<body>

    <div class="login-wrapper">
        <div class="logo-container" style="gap: 8px;">
            <img src="{% static 'img/logo_tujuh_sembilan.png' %}" alt="Logo Tujuh Sembilan"
                style="height: 50px; width: auto; object-fit: contain; flex-shrink: 0;">
        </div>

        <div class="login-title">
            <h1>SILAPTOP79</h1>
            <p>Silakan masuk untuk mengelola inventori dan rekomendasi laptop.</p>
        </div>

        {% if form.errors %}
        <div class="error-message">
            Username atau password yang Anda masukkan salah.
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username" class="form-label">Email</label>
                <input type="text" id="username" name="username" class="form-input" required autofocus
                    placeholder="Masukkan username">
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" class="form-input" required
                        placeholder="Masukkan password">
                    <i class="fa-regular fa-eye right-icon" onclick="togglePassword()"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">Masuk</button>
            <input type="hidden" name="next" value="{{ next|default:'/login-redirect/' }}" />
        </form>
    </div>

    <script>
        function togglePassword() {
            var passwordInput = document.getElementById("password");
            var icon = document.querySelector(".right-icon");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>

</html>
